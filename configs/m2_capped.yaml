seed: 42

data:
  source: "tensorflow_datasets"
  tfds_name: "lfw"
  cache_dir: "data/lfw_cache"

split_policy:
  description: "Split by identity. 70% train, 15% val, 15% test."
  train: 0.70
  val: 0.15
  test: 0.15

pairs:
  num_positive_per_split: 500
  num_negative_per_split: 500
  output_dir: "outputs/pairs_v2"
  max_images_per_identity: 10   # cap overrepresented identities
  min_images_for_positive: 2

manifest:
  output_path: "outputs/manifest.json"

benchmark:
  n_vectors: 10000
  vector_dim: 128
  output_path: "outputs/bench/results.txt"

evaluation:
  threshold_sweep:
    n_thresholds: 100
  threshold_selection_rule: "max_balanced_accuracy"
  locked_threshold: null
  artifacts_dir: "outputs/eval_v2"
  runs_dir: "outputs/runs"
